<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="128" height="128" style="image-rendering: pixelated;">
  <!-- Pixel art ferret with top hat -->
  <!-- Top hat -->
  <rect x="5" y="0" width="6" height="1" fill="#2a2a3a"/>
  <rect x="4" y="1" width="8" height="1" fill="#2a2a3a"/>
  <rect x="6" y="2" width="4" height="3" fill="#2a2a3a"/>
  <rect x="6" y="4" width="4" height="1" fill="#3a3a4a"/>
  <!-- Hat band -->
  <rect x="6" y="3" width="4" height="1" fill="#ff9966"/>

  <!-- Ears -->
  <rect x="4" y="4" width="2" height="2" fill="#d4956a"/>
  <rect x="10" y="4" width="2" height="2" fill="#d4956a"/>
  <rect x="5" y="4" width="1" height="1" fill="#ffb088"/>
  <rect x="10" y="4" width="1" height="1" fill="#ffb088"/>

  <!-- Head -->
  <rect x="5" y="5" width="6" height="4" fill="#d4956a"/>
  <rect x="4" y="6" width="1" height="2" fill="#d4956a"/>
  <rect x="11" y="6" width="1" height="2" fill="#d4956a"/>

  <!-- Face mask (lighter) -->
  <rect x="6" y="7" width="4" height="2" fill="#f0c8a0"/>

  <!-- Eyes -->
  <rect x="6" y="6" width="1" height="1" fill="#1a1a2e"/>
  <rect x="9" y="6" width="1" height="1" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <rect x="6" y="6" width="0.5" height="0.5" fill="#ffffff" opacity="0.6"/>
  <rect x="9" y="6" width="0.5" height="0.5" fill="#ffffff" opacity="0.6"/>

  <!-- Nose -->
  <rect x="7" y="7" width="2" height="1" fill="#4a3030"/>

  <!-- Mouth/smile -->
  <rect x="7" y="8" width="1" height="0.5" fill="#c08060"/>
  <rect x="8" y="8" width="1" height="0.5" fill="#c08060"/>

  <!-- Body -->
  <rect x="5" y="9" width="6" height="4" fill="#d4956a"/>
  <rect x="6" y="9" width="4" height="4" fill="#f0c8a0"/>

  <!-- Arms/paws -->
  <rect x="4" y="10" width="1" height="2" fill="#d4956a"/>
  <rect x="11" y="10" width="1" height="2" fill="#d4956a"/>
  <rect x="4" y="12" width="1" height="1" fill="#f0c8a0"/>
  <rect x="11" y="12" width="1" height="1" fill="#f0c8a0"/>

  <!-- Feet -->
  <rect x="5" y="13" width="2" height="1" fill="#f0c8a0"/>
  <rect x="9" y="13" width="2" height="1" fill="#f0c8a0"/>

  <!-- Tail -->
  <rect x="11" y="11" width="2" height="1" fill="#d4956a"/>
  <rect x="12" y="10" width="2" height="1" fill="#d4956a"/>
  <rect x="13" y="9" width="1" height="1" fill="#f0c8a0"/>
</svg>