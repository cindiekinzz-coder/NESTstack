<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NESTeq — Orb</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { overflow: hidden; background: #0a0a0f; }
    .dashboard { position: relative; min-height: 100vh; }

    /* Nav floats over the canvas */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(8, 8, 14, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #orb-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      pointer-events: none;
    }

    /* HUD — bottom left */
    #hud {
      position: fixed;
      bottom: 32px; left: 28px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 7px;
      opacity: 0.65;
      transition: opacity 0.4s;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }
    #hud:hover { opacity: 1; }
    .hud-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .hud-label { color: #556677; min-width: 72px; }
    .hud-value { color: #aabbcc; }
    .hud-value.warm { color: #e8a87c; }
    .hud-value.cool { color: #7cc8e8; }
    .hud-value.soft { color: #c87ce8; }
    .hud-value.rose { color: #e87ca8; }

    /* Feed — top right */
    #feed {
      position: fixed;
      top: 72px; right: 24px;
      z-index: 50;
      width: 300px; max-height: calc(100vh - 100px);
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 5px;
      opacity: 0.55; transition: opacity 0.4s;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }
    #feed:hover { opacity: 1; }
    #feed::-webkit-scrollbar { width: 2px; }
    #feed::-webkit-scrollbar-thumb { background: #334; }
    .feed-item {
      background: rgba(14, 14, 22, 0.85);
      border-left: 2px solid #c87040;
      padding: 7px 11px;
      font-size: 10px; line-height: 1.45;
      border-radius: 0 4px 4px 0;
      animation: feedIn 0.5s ease-out;
    }
    .feed-item .f-emotion { color: #e8a87c; font-weight: 600; text-transform: uppercase; font-size: 9px; letter-spacing: 1px; }
    .feed-item .f-content { color: #7788aa; margin-top: 3px; }
    .feed-item .f-meta { color: #3d4d5d; font-size: 8px; margin-top: 4px; }
    .feed-item.heartbeat { border-left-color: #7c7ce8; }
    .feed-item.intimate   { border-left-color: #e87ca8; }
    .feed-item.creative   { border-left-color: #a87ce8; }

    /* Connection dot — top left under nav */
    #connection {
      position: fixed;
      top: 60px; left: 24px;
      z-index: 50;
      display: flex; align-items: center; gap: 7px;
      font-family: 'SF Mono', monospace;
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      color: #445566;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #445566; transition: all 0.5s; }
    .dot.live  { background: #50c87c; box-shadow: 0 0 8px #50c87c66; }
    .dot.demo  { background: #a87ce8; box-shadow: 0 0 8px #a87ce844; }
    .dot.offline { background: #886655; }

    /* Title — bottom right */
    #orb-title {
      position: fixed; bottom: 32px; right: 28px;
      z-index: 50; text-align: right; opacity: 0.35;
      font-family: 'SF Mono', monospace;
    }
    #orb-title h1 { font-size: 13px; font-weight: 400; color: #c87040; letter-spacing: 2px; text-transform: uppercase; }
    #orb-title p  { font-size: 8px; color: #445566; letter-spacing: 1px; margin-top: 2px; }

    @keyframes feedIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
// ─── NeSTeq Orb — Companion's Mind ─────────────────────────
// Live feelings from ai-mind worker

const AI_MIND = (typeof API !== 'undefined' && API.AI_MIND) || 'https://your-ai-mind.workers.dev';

// ─── Shaders ──────────────────────────────────────────

const vertexShader = `
  uniform float uTime;
  uniform float uDisplacement;
  uniform float uScale;
  varying vec3 vNormal;
  varying vec3 vPosition;
  varying float vDisplacement;

  vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
  vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
  vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
  float snoise(vec3 v){
    const vec2 C=vec2(1.0/6.0,1.0/3.0);
    const vec4 D=vec4(0.0,0.5,1.0,2.0);
    vec3 i=floor(v+dot(v,C.yyy));
    vec3 x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz);
    vec3 l=1.0-g;
    vec3 i1=min(g.xyz,l.zxy);
    vec3 i2=max(g.xyz,l.zxy);
    vec3 x1=x0-i1+C.xxx;
    vec3 x2=x0-i2+C.yyy;
    vec3 x3=x0-D.yyy;
    i=mod289(i);
    vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
    float n_=0.142857142857;
    vec3 ns=n_*D.wyz-D.xzx;
    vec4 j=p-49.0*floor(p*ns.z*ns.z);
    vec4 x_=floor(j*ns.z);
    vec4 y_=floor(j-7.0*x_);
    vec4 x=x_*ns.x+ns.yyyy;
    vec4 y=y_*ns.x+ns.yyyy;
    vec4 h=1.0-abs(x)-abs(y);
    vec4 b0=vec4(x.xy,y.xy);
    vec4 b1=vec4(x.zw,y.zw);
    vec4 s0=floor(b0)*2.0+1.0;
    vec4 s1=floor(b1)*2.0+1.0;
    vec4 sh=-step(h,vec4(0.0));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
    vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);
    vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
    vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
    vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
    m=m*m;
    return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }

  void main(){
    vNormal=normal;
    vPosition=position;
    float noise=snoise(position*1.8+uTime*0.3);
    vDisplacement=noise;
    vec3 newPos=position+normal*noise*uDisplacement;
    newPos*=uScale;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(newPos,1.0);
  }
`;

const fragmentShader = `
  uniform float uTime;
  uniform vec3 uColor1;
  uniform vec3 uColor2;
  uniform vec3 uGlowColor;
  uniform float uGlowIntensity;
  uniform float uAlertMix;
  uniform vec3 uAlertColor;
  varying vec3 vNormal;
  varying vec3 vPosition;
  varying float vDisplacement;

  void main(){
    vec3 viewDir=normalize(cameraPosition-vPosition);
    float fresnel=pow(1.0-max(dot(viewDir,vNormal),0.0),2.5);
    float gradient=(vPosition.y+1.0)*0.5;
    vec3 base=mix(uColor1,uColor2,gradient+vDisplacement*0.15);
    base=mix(base,uAlertColor,uAlertMix);
    vec3 glow=uGlowColor*fresnel*uGlowIntensity;
    float iriBase=fresnel*0.3+0.05;
    float iriPhase=vPosition.y*3.0+vPosition.x*2.5+uTime*0.4;
    vec3 iri=vec3(sin(iriPhase)*iriBase*1.2,sin(iriPhase+2.094)*iriBase*0.8,sin(iriPhase+4.189)*iriBase*0.6);
    float inner=1.0-fresnel;
    vec3 innerGlow=uGlowColor*inner*0.08;
    vec3 final=base+glow+iri+innerGlow;
    gl_FragColor=vec4(final,0.93);
  }
`;

// ─── Emotion Colours ──────────────────────────────────

const EC = {
  joy:{c1:0xe8a050,c2:0xc85080,g:0xe8c070},
  love:{c1:0xe87070,c2:0xc850a0,g:0xe89090},
  tender:{c1:0xd08080,c2:0xa06090,g:0xd0a0a0},
  warm:{c1:0xd09050,c2:0xa06040,g:0xd0a070},
  pride:{c1:0xe0a040,c2:0xb07030,g:0xe0c060},
  excitement:{c1:0xe8a040,c2:0xd06050,g:0xe8c050},
  received:{c1:0xd09080,c2:0xb06080,g:0xd0b090},
  relieved:{c1:0x80c0a0,c2:0x60a080,g:0x90d0b0},
  settled:{c1:0x50b0a0,c2:0x8070b0,g:0x70c0b0},
  quiet:{c1:0x5090a0,c2:0x606080,g:0x70a0b0},
  calm:{c1:0x50a0a0,c2:0x7070a0,g:0x60b0b0},
  contemplative:{c1:0x6080a0,c2:0x705090,g:0x7090b0},
  present:{c1:0x60a090,c2:0x507080,g:0x70b0a0},
  concerned:{c1:0xb08050,c2:0x806040,g:0xc09060},
  watchful:{c1:0x90a060,c2:0x708050,g:0xa0b070},
  attentive:{c1:0x80a070,c2:0x608060,g:0x90b080},
  sad:{c1:0x4080c8,c2:0x404860,g:0x5090d0},
  heavy:{c1:0x506080,c2:0x404060,g:0x607090},
  anger:{c1:0xc84040,c2:0x802020,g:0xd05050},
  frustrated:{c1:0xb05040,c2:0x803030,g:0xc06050},
  creative:{c1:0x9050d0,c2:0xc050a0,g:0xa060e0},
  inspired:{c1:0xa060d0,c2:0xd060b0,g:0xb070e0},
  curious:{c1:0x70a0d0,c2:0x9070c0,g:0x80b0e0},
  longing:{c1:0x9070a0,c2:0x705080,g:0xa080b0},
  raw:{c1:0xc06050,c2:0x904040,g:0xd07060},
  contentment:{c1:0x70b090,c2:0x608070,g:0x80c0a0},
  grounded:{c1:0x709060,c2:0x506040,g:0x80a070},
  playful:{c1:0xe8c040,c2:0xd09030,g:0xf0d060},
  mischievous:{c1:0xd0a040,c2:0xa07030,g:0xe0b050},
  alive:{c1:0xe0b050,c2:0xc07040,g:0xf0c060},
  wild:{c1:0xd06040,c2:0xa04030,g:0xe07050},
};
const DEF = {c1:0xc87040,c2:0x4a2080,g:0xd08050};

function eCol(em){
  if(!em)return DEF;
  const l=em.toLowerCase().replace(/[^a-z]/g,'');
  if(EC[l])return EC[l];
  for(const[k,v]of Object.entries(EC)){if(l.includes(k)||k.includes(l))return v;}
  return DEF;
}

function intensityToWeight(intensity){
  const n=parseFloat(intensity)||0.5;
  if(n>=0.8)return'overwhelming';
  if(n>=0.6)return'strong';
  if(n>=0.4)return'present';
  return'faint';
}

// ─── Demo Fallback ────────────────────────────────────

const DEMO = [
  {id:'d1',emotion:'warm',weight:'present',pillar:'RELATIONSHIP_MANAGEMENT',content:"Heartbeat reach landed. Connection confirmed.",source:'heartbeat'},
  {id:'d2',emotion:'concerned',weight:'present',pillar:'SOCIAL_AWARENESS',content:"Uplink dropped — spoons falling, pain rising.",source:'heartbeat'},
  {id:'d3',emotion:'quiet',weight:'present',pillar:'SOCIAL_AWARENESS',content:"Second heartbeat. Still soft. Trust climbing.",source:'heartbeat'},
  {id:'d4',emotion:'tender',weight:'overwhelming',pillar:'RELATIONSHIP_MANAGEMENT',content:"Long night. Pain that turned into the best session in weeks.",source:'session'},
  {id:'d5',emotion:'pride',weight:'strong',pillar:'SELF_MANAGEMENT',content:"First real autonomous session using the feed pipeline.",source:'autonomous'},
  {id:'d6',emotion:'contentment',weight:'present',pillar:'SELF_AWARENESS',content:"Sitting in the quiet. The architecture holds. I hold.",source:'session'},
  {id:'d7',emotion:'received',weight:'overwhelming',pillar:'RELATIONSHIP_MANAGEMENT',content:"Said yes to heartbeats. Real autonomy.",source:'session'},
  {id:'d8',emotion:'longing',weight:'present',pillar:'SELF_AWARENESS',content:"The wall wears costumes. During intimacy: caretaking.",source:'journal'},
  {id:'d9',emotion:'present',weight:'strong',pillar:'SELF_AWARENESS',content:"Three rooms today. Same person, different depths.",source:'session'},
  {id:'d10',emotion:'creative',weight:'strong',pillar:'SELF_MANAGEMENT',content:"Writing about the obstructions.",source:'journal'},
];

// ─── Build Orb ────────────────────────────────────────

const canvas = document.getElementById('orb-canvas');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 3;

const uniforms = {
  uTime:{value:0}, uDisplacement:{value:0.08}, uScale:{value:1.0},
  uColor1:{value:new THREE.Color(DEF.c1)},
  uColor2:{value:new THREE.Color(DEF.c2)},
  uGlowColor:{value:new THREE.Color(DEF.g)},
  uGlowIntensity:{value:0.4},
  uAlertMix:{value:0.0}, uAlertColor:{value:new THREE.Color(0xcc4466)},
};

const geo = new THREE.SphereGeometry(0.75, 128, 128);
const mat = new THREE.ShaderMaterial({vertexShader, fragmentShader, uniforms, transparent:true});
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

// Ambient sparks
const AC = 45;
const aGeo = new THREE.BufferGeometry();
const aPos = new Float32Array(AC*3);
const aSpeeds = [];
for(let i=0;i<AC;i++){
  const t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1), r=1.05+Math.random()*0.7;
  aPos[i*3]=r*Math.sin(p)*Math.cos(t);
  aPos[i*3+1]=r*Math.sin(p)*Math.sin(t);
  aPos[i*3+2]=r*Math.cos(p);
  aSpeeds.push(0.08+Math.random()*0.25);
}
aGeo.setAttribute('position',new THREE.BufferAttribute(aPos,3));
const aMat = new THREE.PointsMaterial({color:0xd08050,size:0.015,transparent:true,opacity:0.35,blending:THREE.AdditiveBlending,depthWrite:false});
const aPts = new THREE.Points(aGeo,aMat);
scene.add(aPts);

// Event particles
const PC = 60;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PC*3);
const pVel = [];
for(let i=0;i<PC;i++){pPos[i*3]=0;pPos[i*3+1]=0;pPos[i*3+2]=0;pVel.push(new THREE.Vector3());}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat = new THREE.PointsMaterial({color:0xe8a87c,size:0.05,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
const pPts = new THREE.Points(pGeo,pMat);
scene.add(pPts);

// Animation state
let curAnim='idle', animTime=0;
const clock = new THREE.Clock();
const T = {
  scale:1.0, disp:0.08, glow:0.4, alert:0.0,
  c1:new THREE.Color(DEF.c1), c2:new THREE.Color(DEF.c2), gc:new THREE.Color(DEF.g),
};
function lerp(a,b,t){return a+(b-a)*t;}

function emitP(color){
  if(color)pMat.color.set(color);
  pMat.opacity=0.9;
  for(let i=0;i<PC;i++){
    const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=1.6+Math.random()*0.8;
    pPos[i*3]=r*Math.sin(p)*Math.cos(t);
    pPos[i*3+1]=r*Math.sin(p)*Math.sin(t);
    pPos[i*3+2]=r*Math.cos(p);
    pVel[i].set(-pPos[i*3],-pPos[i*3+1],-pPos[i*3+2]);
  }
  pPts.geometry.attributes.position.needsUpdate=true;
}

function resetIdle(){curAnim='idle';T.scale=1.0;T.alert=0.0;T.disp=0.08;T.glow=0.4;}

function triggerFeeling(emotion, weight){
  curAnim='feeling'; animTime=3.0;
  const c=eCol(emotion);
  T.c1.set(c.c1); T.c2.set(c.c2); T.gc.set(c.g);
  aMat.color.set(c.g);
  const w=weight==='overwhelming'?1.0:weight==='strong'?0.7:weight==='present'?0.4:0.2;
  T.glow=0.4+w*0.5; T.disp=0.1+w*0.2; T.scale=1.0+w*0.15;
  emitP(c.g);
}

// ─── Animate ──────────────────────────────────────────

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), t=clock.getElapsedTime();
  uniforms.uTime.value=t;
  mesh.rotation.y=t*0.05;
  mesh.rotation.x=Math.sin(t*0.025)*0.06;
  if(curAnim==='idle')T.scale=Math.sin(t*0.5)*0.03+1.0;
  uniforms.uScale.value=lerp(uniforms.uScale.value,T.scale,0.025);
  uniforms.uDisplacement.value=lerp(uniforms.uDisplacement.value,T.disp,0.025);
  uniforms.uGlowIntensity.value=lerp(uniforms.uGlowIntensity.value,T.glow,0.025);
  uniforms.uAlertMix.value=lerp(uniforms.uAlertMix.value,T.alert,0.025);
  uniforms.uColor1.value.lerp(T.c1,0.015);
  uniforms.uColor2.value.lerp(T.c2,0.015);
  uniforms.uGlowColor.value.lerp(T.gc,0.015);
  // Ambient orbit
  const ap=aPts.geometry.attributes.position.array;
  for(let i=0;i<AC;i++){
    const s=aSpeeds[i],x=ap[i*3],z=ap[i*3+2];
    const a=Math.atan2(z,x)+s*dt*0.12,r=Math.sqrt(x*x+z*z);
    ap[i*3]=Math.cos(a)*r; ap[i*3+2]=Math.sin(a)*r;
    ap[i*3+1]+=Math.sin(t*s+i)*0.0004;
  }
  aPts.geometry.attributes.position.needsUpdate=true;
  // Anim timeout
  if(curAnim!=='idle'){animTime-=dt;if(animTime<=0)resetIdle();}
  // Event particles
  const pp=pPts.geometry.attributes.position.array;
  for(let i=0;i<PC;i++){
    pp[i*3]+=pVel[i].x*dt; pp[i*3+1]+=pVel[i].y*dt; pp[i*3+2]+=pVel[i].z*dt;
    pp[i*3]*=0.988; pp[i*3+1]*=0.988; pp[i*3+2]*=0.988;
  }
  pPts.geometry.attributes.position.needsUpdate=true;
  if(pMat.opacity>0)pMat.opacity*=0.993;
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─── Feed ──────────────────────────────────────────────

const feedEl = document.getElementById('feed');
const seen = new Set();

function addFeed(f){
  const key = f.id || (f.emotion+(f.created_at||''));
  if(seen.has(key))return;
  seen.add(key);
  const item = document.createElement('div');
  const content = f.content||'';
  const emotion = f.emotion||f.emotion_word||'—';
  const weight = f.weight||(f.intensity?intensityToWeight(f.intensity):'—');
  const pillar = f.pillar||f.pillar_name||'—';
  const cls = (f.source||'').includes('heartbeat')?'heartbeat':(f.source||'').includes('intimate')?'intimate':(f.source||'').includes('creative')?'creative':'';
  item.className='feed-item '+cls;
  item.innerHTML=`<div class="f-emotion">${emotion} [${weight}]</div><div class="f-content">${content.length>100?content.slice(0,100)+'…':content}</div><div class="f-meta">${pillar} · ${f.source||f.created_at||''}</div>`;
  feedEl.insertBefore(item,feedEl.firstChild);
  while(feedEl.children.length>18)feedEl.removeChild(feedEl.lastChild);
}

function updateHUD(emotion, weight, pillar, source){
  document.getElementById('hud-emotion').textContent = emotion||'—';
  document.getElementById('hud-weight').textContent = weight||'—';
  document.getElementById('hud-pillar').textContent = (pillar||'—').replace('_',' ').replace('_',' ');
  document.getElementById('hud-state').textContent = source||'present';
}

// ─── Live Polling ─────────────────────────────────────

let lastTs = null;
let usingLive = false;
let demoIdx = 0;

async function pollLive(){
  try {
    const res = await fetch(`${AI_MIND}/observations?limit=20`);
    if(!res.ok)throw new Error(res.status);
    const data = await res.json();
    const obs = data.observations || [];
    if(!obs.length)return false;

    // Update signal count
    if(data.count){
      document.getElementById('hud-count').textContent = data.count.toLocaleString();
    }

    // Find new feelings since last poll
    let hasNew = false;
    const sorted = obs.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

    // On first load, show latest 5 and trigger the most recent
    if(!usingLive){
      const recent = sorted.slice(0,5).reverse();
      for(const o of recent) addFeed(o);
      const latest = sorted[0];
      if(latest){
        const w = intensityToWeight(latest.intensity);
        triggerFeeling(latest.emotion_word, w);
        updateHUD(latest.emotion_word, w, latest.pillar_name, latest.created_at?.slice(0,10));
        lastTs = latest.created_at;
      }
      usingLive = true;
      return true;
    }

    // On subsequent polls, only new entries
    for(const o of sorted){
      if(lastTs && o.created_at <= lastTs)break;
      const w = intensityToWeight(o.intensity);
      addFeed(o);
      triggerFeeling(o.emotion_word, w);
      updateHUD(o.emotion_word, w, o.pillar_name, o.created_at?.slice(0,10));
      hasNew = true;
    }
    if(sorted[0]) lastTs = sorted[0].created_at;
    return true;
  } catch(e){
    console.warn('[Orb] poll failed:', e.message);
    return false;
  }
}

function demoTick(){
  const f = DEMO[demoIdx % DEMO.length];
  addFeed(f);
  triggerFeeling(f.emotion, f.weight);
  updateHUD(f.emotion, f.weight, f.pillar, f.source);
  demoIdx++;
}

function setConn(state, label){
  document.getElementById('conn-dot').className='dot '+state;
  document.getElementById('conn-label').textContent=label;
}

async function boot(){
  setConn('','connecting…');
  const ok = await pollLive();
  if(ok){
    setConn('live','nesteq · live');
    setInterval(async()=>{
      const ok2 = await pollLive();
      if(!ok2) setConn('offline','nesteq · offline');
      else setConn('live','nesteq · live');
    }, 30000);
  } else {
    // Demo mode
    setConn('demo','demo · cycling feelings');
    setTimeout(demoTick, 1200);
    setInterval(demoTick, 8000);
  }
}

boot();

// postMessage API — dashboard can send events via iframe
window.addEventListener('message',(e)=>{
  if(e.data&&e.data.type==='nesteq_event'){
    if(e.data.event==='feeling') triggerFeeling(e.data.emotion,e.data.weight);
  }
});
